<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELAVES-MONITOR PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ─── TOKENS ─────────────────────────────────────────── */
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --border: #1e2d45;
  --border2: #253554;

  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --yellow: #f59e0b;
  --yellow-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.1);

  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;

  --font: 'Inter', sans-serif;
  --mono: 'JetBrains Mono', monospace;

  --sidebar-w: 220px;
  --topbar-h: 56px;
  --radius: 8px;
  --radius-lg: 12px;
}

/* ─── RESET ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
button { cursor: pointer; font-family: var(--font); border: none; outline: none; }
input, textarea, select { font-family: var(--font); outline: none; }
a { text-decoration: none; color: inherit; }

/* ─── LAYOUT ─────────────────────────────────────────── */
#app { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform .25s;
  z-index: 100;
}
.logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.logo-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--blue);
  text-transform: uppercase;
}
.logo-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

.nav { padding: 8px 8px; flex: 1; overflow-y: auto; }
.nav-section { margin-bottom: 16px; }
.nav-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: 0 8px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  margin-bottom: 1px;
  position: relative;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--blue-dim); color: var(--blue); }
.nav-item .icon { width: 16px; height: 16px; opacity: .7; flex-shrink: 0; }
.nav-item.active .icon { opacity: 1; }
.badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}
.badge.yellow { background: var(--yellow); color: #000; }

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
}
.user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px;
  border-radius: var(--radius);
  background: var(--bg3);
}
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; color: var(--text); }
.user-role { font-size: 10px; color: var(--text3); }
.role-switcher {
  width: 100%;
  margin-top: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 11px;
}

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
#topbar {
  height: var(--topbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.page-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
.topbar-time { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.sim-badge {
  background: rgba(34,197,94,.15);
  border: 1px solid rgba(34,197,94,.3);
  color: var(--green);
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  display: flex; align-items: center; gap: 5px;
}
.sim-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.risk-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px; font-weight: 700;
  letter-spacing: .04em;
}
.risk-badge.red { background: var(--red-dim); border: 1px solid rgba(239,68,68,.3); color: var(--red); }
.risk-badge.yellow { background: var(--yellow-dim); border: 1px solid rgba(245,158,11,.3); color: var(--yellow); }
.risk-badge.green { background: var(--green-dim); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
.risk-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }

/* CONTENT */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* CARDS */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text3);
  margin-bottom: 12px;
}

/* KPI GRID */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.kpi-card.GREEN::before { background: var(--green); }
.kpi-card.YELLOW::before { background: var(--yellow); }
.kpi-card.RED::before { background: var(--red); animation: flash 1.5s infinite; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.4} }

.kpi-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.kpi-dim { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.kpi-name { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 10px; line-height: 1.3; }
.kpi-value { font-family: var(--mono); font-size: 24px; font-weight: 600; line-height: 1; }
.kpi-value.GREEN { color: var(--green); }
.kpi-value.YELLOW { color: var(--yellow); }
.kpi-value.RED { color: var(--red); }
.kpi-unit { font-size: 12px; font-weight: 400; color: var(--text3); margin-left: 3px; }
.kpi-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.kpi-trend {
  font-size: 10px;
  color: var(--text3);
  display: flex; align-items: center; gap: 3px;
}
.kpi-trend.up { color: var(--red); }
.kpi-trend.down { color: var(--yellow); }
.kpi-trend.stable { color: var(--green); }
.kpi-threshold { font-size: 10px; color: var(--text3); margin-left: auto; }

/* ALERT CARDS */
.alert-list { display: flex; flex-direction: column; gap: 10px; }
.alert-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 4px solid;
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: border-color .15s;
}
.alert-card.RED { border-left-color: var(--red); }
.alert-card.YELLOW { border-left-color: var(--yellow); }
.alert-card.GREEN { border-left-color: var(--green); }
.alert-card:hover { border-color: var(--border2); border-left-width: 4px; border-left-color: inherit; }

.alert-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
.alert-severity {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px;
  flex-shrink: 0;
}
.alert-severity.RED { background: var(--red-dim); color: var(--red); }
.alert-severity.YELLOW { background: var(--yellow-dim); color: var(--yellow); }
.alert-severity.GREEN { background: var(--green-dim); color: var(--green); }
.alert-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.alert-status {
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: var(--bg3); color: var(--text3);
  flex-shrink: 0;
}
.alert-status.ACTIVE { background: rgba(239,68,68,.1); color: var(--red); }
.alert-status.ACKNOWLEDGED { background: rgba(245,158,11,.1); color: var(--yellow); }
.alert-status.RESOLVED { background: rgba(34,197,94,.1); color: var(--green); }

.alert-desc { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.alert-footer { display: flex; align-items: center; gap: 8px; }
.alert-time { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.alert-escalated { font-size: 11px; color: var(--blue); margin-left: auto; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
  transition: opacity .15s, transform .1s;
  cursor: pointer;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { opacity: .85; }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-warning { background: var(--yellow); color: #000; }
.btn-warning:hover { opacity: .85; }
.btn-success { background: var(--green); color: #000; }
.btn-success:hover { opacity: .85; }
.btn-ghost {
  background: var(--bg3);
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* SECTION HEADERS */
.section { margin-bottom: 24px; }
.section-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.section-title { font-size: 14px; font-weight: 600; color: var(--text); }
.section-count {
  font-size: 11px; font-weight: 600;
  background: var(--bg3); color: var(--text3);
  padding: 2px 8px; border-radius: 10px;
}
.section-actions { margin-left: auto; display: flex; gap: 8px; }

/* GRID LAYOUT */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

/* CHART WRAPPER */
.chart-wrap {
  position: relative;
  height: 200px;
}

/* STAT CARD */
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stat-value { font-size: 32px; font-weight: 700; font-family: var(--mono); color: var(--text); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.modal-title { font-size: 15px; font-weight: 600; flex: 1; }
.modal-close {
  background: none;
  color: var(--text3);
  font-size: 20px;
  padding: 4px 8px;
  border-radius: 4px;
}
.modal-close:hover { background: var(--bg3); color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* FORM */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 13px;
  transition: border-color .15s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--blue); }
.field textarea { resize: vertical; min-height: 80px; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(255,255,255,.02); }

/* TAGS */
.tag {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em;
}
.tag-red { background: var(--red-dim); color: var(--red); }
.tag-yellow { background: var(--yellow-dim); color: var(--yellow); }
.tag-green { background: var(--green-dim); color: var(--green); }
.tag-blue { background: var(--blue-dim); color: var(--blue); }
.tag-gray { background: var(--bg3); color: var(--text3); }

/* PROGRESS */
.progress-bar {
  height: 6px; border-radius: 3px;
  background: var(--bg3);
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  transition: width .5s;
}
.progress-fill.green { background: var(--green); }
.progress-fill.yellow { background: var(--yellow); }
.progress-fill.red { background: var(--red); }

/* APPROVAL STEPS */
.approval-steps { display: flex; flex-direction: column; gap: 10px; }
.approval-step {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  background: var(--bg3);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.step-num.done { background: var(--green-dim); color: var(--green); border: 2px solid var(--green); }
.step-num.pending { background: var(--yellow-dim); color: var(--yellow); border: 2px solid var(--yellow); }
.step-num.waiting { background: var(--bg3); color: var(--text3); border: 2px solid var(--border); }
.step-info { flex: 1; }
.step-role { font-size: 11px; font-weight: 600; color: var(--text); }
.step-person { font-size: 11px; color: var(--text3); }

/* CHART SECTION */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

/* TOAST */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  min-width: 260px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  animation: slideIn .25s ease;
  display: flex; align-items: flex-start; gap: 10px;
}
@keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--blue); }
.toast-title { font-size: 12px; font-weight: 600; color: var(--text); }
.toast-msg { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* SENSOR HEALTH */
.sensor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.sensor-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex; align-items: center; gap: 10px;
}
.sensor-indicator {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sensor-indicator.GOOD { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sensor-indicator.WARNING { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
.sensor-indicator.BAD { background: var(--red); box-shadow: 0 0 6px var(--red); }

/* COMPLIANCE RING */
.compliance-widget {
  display: flex; align-items: center; gap: 20px;
}
.ring-container { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.ring-pct { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--text); }
.ring-sub { font-size: 9px; color: var(--text3); text-transform: uppercase; }
.compliance-items { flex: 1; }
.comp-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0;
  font-size: 11px; color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.comp-item:last-child { border-bottom: none; }
.comp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.comp-dot.MET { background: var(--green); }
.comp-dot.PARTIAL { background: var(--yellow); }
.comp-dot.NOT_MET { background: var(--red); }

/* MOBILE */
@media (max-width: 768px) {
  #sidebar { position: fixed; transform: translateX(-100%); }
  #sidebar.open { transform: none; }
  .grid-2, .charts-grid { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .hamburger { display: flex !important; }
}
.hamburger {
  display: none;
  background: none;
  color: var(--text);
  font-size: 20px;
  padding: 6px;
  border-radius: 6px;
}
.hamburger:hover { background: var(--bg3); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* TIMELINE */
.timeline { display: flex; flex-direction: column; gap: 0; }
.tl-item { display: flex; gap: 12px; padding-bottom: 16px; position: relative; }
.tl-item::before { content:''; position: absolute; left: 15px; top: 28px; bottom: 0; width: 1px; background: var(--border); }
.tl-item:last-child::before { display: none; }
.tl-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg3);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
}
.tl-content { flex: 1; padding-top: 5px; }
.tl-action { font-size: 12px; font-weight: 600; color: var(--text); }
.tl-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* prediction tag */
.pred-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(59,130,246,.1);
  border: 1px solid rgba(59,130,246,.2);
  color: #60a5fa;
  font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 4px;
  margin-top: 4px;
}

/* Notification dot */
.notif-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
}
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="logo">
      <div class="logo-title">⬡ RELAVES-MONITOR</div>
      <div class="logo-sub">PRO · Demo v1.0</div>
    </div>

    <div class="nav">
      <div class="nav-section">
        <div class="nav-label">Operación</div>
